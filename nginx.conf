server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Fichiers React (SPA) : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés par Vite (hash dans le nom de fichier)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy vers le backend Spring Boot ("app" = nom du service dans app.yml,
    # résolu via le réseau Docker partagé terangasenegaluser_default)
    location /api/ {
        proxy_pass http://app:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}